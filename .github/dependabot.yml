# ============================================================
# Dependabot configuration
# Keeps GitHub Actions and Docker base images up to date
# automatically by opening PRs for version bumps.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Behaviour summary:
#   - GitHub Actions  : all updates grouped into ONE PR per week.
#   - Docker images   : all directories grouped into ONE PR per week.
#   - Major versions  : ignored for .NET, Java (temurin/gradle), Ruby
#                       and Node so breaking upgrades need an explicit opt-in.
#   - Auto-merge      : a separate workflow (.github/workflows/dependabot-automerge.yml)
#                       automatically merges patch-level Docker and Actions PRs.
# ============================================================

version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────
  # Scans every workflow file under .github/workflows/ and
  # opens a PR whenever an action has a newer pinned version.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
    # All Actions bumps batched into one PR per week.
    groups:
      github-actions-all:
        patterns:
          - "*"

  # ── Docker base images ──────────────────────────────────────
  # All Dockerfile directories are grouped into a single weekly PR.
  # Major-version jumps for runtimes that require code changes are
  # ignored so they never appear without an explicit decision.

  - package-ecosystem: "docker"
    directory: "/docker/angular"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker/dotnet"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
    # .NET major upgrades (e.g. 8 -> 9 -> 10) require retargeting the
    # project. Pin to the current major and bump manually when ready.
    ignore:
      - dependency-name: "mcr.microsoft.com/dotnet/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mcr.microsoft.com/dotnet/aspnet"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mcr.microsoft.com/dotnet/runtime"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/docker/go"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker/java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
    # Gradle 9 has breaking DSL changes; eclipse-temurin LTS cadence is
    # every 3 years. Block major bumps until explicitly reviewed.
    ignore:
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eclipse-temurin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "maven"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/docker/node"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
    # Only track Active LTS Node releases (even major numbers).
    # Odd-numbered releases (23, 25 ...) are short-lived Current releases.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/docker/python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker/react"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker/ruby"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
    # Ruby 4.0 is brand-new; gem compatibility needs explicit testing.
    ignore:
      - dependency-name: "ruby"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/docker/_base"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
