# ============================================================
# Dependabot configuration
# Keeps dependencies up to date across the full DevOps monorepo
# by opening PRs for version bumps on a weekly Monday cadence.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Ecosystems covered:
#   - github-actions : all workflow files under .github/workflows/
#   - docker         : every Dockerfile directory under docker/
#   - terraform      : all Terraform module directories
#   - npm            : Pulumi CDK projects under cd/pulumi/
#   - pip            : Python requirements files
#   - gomod          : Go modules (Terratest)
#
# Common settings (applied to every entry):
#   - schedule       : weekly on Monday at 09:00 UTC
#   - labels         : none (avoids PR failures when repo labels are missing)
#   - reviewers      : platform-team
#   - limit          : 10 open PRs per ecosystem directory
#   - Compatibility  : Docker/base image PRs receive a compatibility
#                      comment from dependabot-automerge.yml.
#                      With PAT_TOKEN set, the score comes from
#                      dependabot/fetch-metadata compat-lookup.
#                      Without PAT_TOKEN, the workflow falls back to a
#                      semver heuristic: patch=95, minor=80, major=45.
#   - Major versions : ignored for runtimes that require code changes
#                      (.NET, Java, Node, Ruby) — bump manually when ready.
#   - Auto-merge     : a separate workflow (dependabot-automerge.yml)
#                      merges patch-level PRs automatically.
# ============================================================

version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────
  # Scans every workflow file under .github/workflows/ and
  # opens a PR whenever an action has a newer pinned version.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "ci(deps)"
    # All Actions bumps batched into one PR per week.
    groups:
      github-actions-all:
        patterns:
          - "*"

  # ── Docker base images ──────────────────────────────────────
  # All Dockerfile directories are grouped into a single weekly PR.
  # Major-version jumps for runtimes that require code changes are
  # ignored so they never appear without an explicit decision.
  # PRs from this section also get a compatibility summary comment
  # to make merge risk easier to assess at a glance.

  - package-ecosystem: "docker"
    directory: "/docker/angular"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker/dotnet"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
    # .NET major upgrades (e.g. 8 -> 9 -> 10) require retargeting the
    # project. Pin to the current major and bump manually when ready.
    ignore:
      - dependency-name: "mcr.microsoft.com/dotnet/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mcr.microsoft.com/dotnet/aspnet"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mcr.microsoft.com/dotnet/runtime"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/docker/go"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker/java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
    # Gradle 9 has breaking DSL changes; eclipse-temurin LTS cadence is
    # every 3 years. Block major bumps until explicitly reviewed.
    ignore:
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eclipse-temurin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "maven"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/docker/node"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
    # Only track Active LTS Node releases (even major numbers).
    # Odd-numbered releases (23, 25 ...) are short-lived Current releases.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/docker/python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker/react"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker/ruby"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-all:
        patterns:
          - "*"
    # Ruby 4.0 is brand-new; gem compatibility needs explicit testing.
    ignore:
      - dependency-name: "ruby"
        update-types: ["version-update:semver-major"]

  # ── Terraform modules ────────────────────────────────────────
  # Each module directory is scanned independently so that provider
  # version bumps produce targeted, reviewable PRs.

  - package-ecosystem: "terraform"
    directory: "/terraform/aws-eks"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: "terraform"
    directory: "/terraform/aws-ecs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: "terraform"
    directory: "/terraform/azure-aks"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: "terraform"
    directory: "/terraform/gcp-gke"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: "terraform"
    directory: "/terraform/azure-app-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: "terraform"
    directory: "/terraform/aws-lambda"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  # ── npm (Pulumi CDK projects) ────────────────────────────────

  - package-ecosystem: "npm"
    directory: "/cd/pulumi/aws"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: "npm"
    directory: "/cd/pulumi/azure"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: "npm"
    directory: "/cd/pulumi/gcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  # ── pip (Python requirements) ────────────────────────────────
  # Dependabot searches for requirements*.txt, setup.cfg, Pipfile,
  # pyproject.toml recursively from the declared directory. Pointing
  # at "/" covers every Python requirements file in the repo.

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"

  # ── gomod (Terratest) ────────────────────────────────────────

  - package-ecosystem: "gomod"
    directory: "/terraform/_testing/terratest"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "platform-team"
    commit-message:
      prefix: "build(deps)"