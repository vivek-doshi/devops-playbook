# Note 1: This Kubernetes style field captures a contract; keeping schema keys stable improves portability across environments.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Note 2: This line contributes to the system's declarative intent, helping future readers reason about behavior and change impact.
  - ../../_base

namespace: production

patches:
  # Note 3: This line contributes to the system's declarative intent, helping future readers reason about behavior and change impact.
  - patch: |-
      - op: replace
        path: /spec/replicas
        # Note 4: This line contributes to the system's declarative intent, helping future readers reason about behavior and change impact.
        value: 3
    target:
      kind: Deployment
      # Note 5: Resource identity and metadata drive automation, selectors, and operational traceability.
      name: app

# PodDisruptionBudget for production high availability
  - patch: |-
      apiVersion: policy/v1
      # Note 6: This Kubernetes style field captures a contract; keeping schema keys stable improves portability across environments.
      kind: PodDisruptionBudget
      metadata:
        name: app-pdb
      # Note 7: This Kubernetes style field captures a contract; keeping schema keys stable improves portability across environments.
      spec:
        minAvailable: 1
        selector:
          # Note 8: This line contributes to the system's declarative intent, helping future readers reason about behavior and change impact.
          matchLabels:
            app: app
    target:
      # Note 9: This Kubernetes style field captures a contract; keeping schema keys stable improves portability across environments.
      kind: Deployment
      name: app

images:
  - name: my-registry/my-app
    newTag: v1.0.0   # Pin to immutable tag in production               # <-- CHANGE THIS
