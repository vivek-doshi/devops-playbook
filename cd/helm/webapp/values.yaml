# ============================================================
# TEMPLATE: Helm Values — Generic Web Application
# WHEN TO USE: Default values for the webapp Helm chart
# WHAT TO CHANGE: Override with values.dev.yaml or values.prod.yaml
# RELATED FILES: cd/helm/webapp/values.dev.yaml, cd/helm/webapp/values.prod.yaml
# ============================================================

# Default values — override with values.dev.yaml or values.prod.yaml

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  repository: my-registry/my-app                            # <-- CHANGE THIS
  pullPolicy: IfNotPresent
  tag: ""  # Overridden by CI with image digest or tag

imagePullSecrets: []

serviceAccount:
  create: false
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: app.example.com
  tls: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env: {}
  # MY_VAR: my-value

secrets: {}
  # DB_PASSWORD: <from-secret>

probes:
  liveness:
    path: /health/live
  readiness:
    path: /health/ready
