# ============================================================
# TEMPLATE: GitHub Actions — Deploy AWS Lambda (Serverless Framework)
# WHEN TO USE: Deploying serverless functions via Serverless Framework or SAM
# PREREQUISITES: serverless.yml in project root, IAM role for OIDC
# SECRETS NEEDED: AWS_DEPLOY_ROLE_ARN
# WHAT TO CHANGE: Stage and region in deploy command
# RELATED FILES: None
# MATURITY: Beta
# ============================================================

name: Deploy AWS Lambda (Serverless Framework)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        run: serverless deploy --stage production

