# ============================================================
# TEMPLATE: External Secrets Operator — SecretStore + ExternalSecret
# WHEN TO USE: Sync secrets from AWS Secrets Manager, Azure Key Vault,
#              or GCP Secret Manager into Kubernetes Secrets automatically.
#              Eliminates manual kubectl create secret and keeps pods
#              reading live vault values without restarts.
#
# PREREQUISITES:
#   Install ESO once per cluster:
#     helm repo add external-secrets https://charts.external-secrets.io
#     helm upgrade --install external-secrets external-secrets/external-secrets \
#       --namespace external-secrets --create-namespace
#
# WHAT TO CHANGE: Lines marked  # <-- CHANGE THIS
# RELATED FILES: security/secret-rotation/aws-rotation-lambda.py
#                security/secret-rotation/azure-keyvault-rotation.tf
# MATURITY: Stable
# ============================================================

---
# ── A. AWS Secrets Manager back-end ─────────────────────────────────────
#
# Authentication: IRSA (IAM Roles for Service Accounts) is the recommended
# approach for EKS.  Annotate the ESO service account with the IAM role ARN
# and ESO will assume it automatically.
#
apiVersion: external-secrets.io/v1beta1
kind: SecretStore                  # Use ClusterSecretStore for cluster-wide access
metadata:
  name: aws-secrets-store
  namespace: default               # <-- CHANGE THIS: use your app namespace
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1            # <-- CHANGE THIS
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa  # <-- CHANGE THIS: SA annotated with IAM role

---
# ── B. Azure Key Vault back-end ──────────────────────────────────────────
#
# Authentication: Workload Identity (recommended for AKS).
# Annotate the service account with azure.workload.identity/client-id.
#
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault-store
  namespace: default               # <-- CHANGE THIS
spec:
  provider:
    azurekv:
      vaultUrl: "https://my-keyvault.vault.azure.net"  # <-- CHANGE THIS
      authType: WorkloadIdentity
      serviceAccountRef:
        name: external-secrets-sa  # <-- CHANGE THIS: SA with workload identity annotation

---
# ── C. GCP Secret Manager back-end ──────────────────────────────────────
#
# Authentication: Workload Identity (recommended for GKE).
#
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secrets-store
  namespace: default               # <-- CHANGE THIS
spec:
  provider:
    gcpsm:
      projectID: my-gcp-project    # <-- CHANGE THIS
      auth:
        workloadIdentity:
          clusterLocation: us-central1   # <-- CHANGE THIS
          clusterName: my-gke-cluster    # <-- CHANGE THIS
          serviceAccountRef:
            name: external-secrets-sa    # <-- CHANGE THIS

---
# ── D. ExternalSecret — sync a single secret ────────────────────────────
#
# Refresh every 1h so the Kubernetes Secret always reflects the latest
# value in the vault.  After rotation the pod reads the new value
# automatically on the next volume-mount refresh (no restart needed).
# Add the Reloader controller annotation to trigger pod restarts if needed.
#
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-db-credentials
  namespace: default                # <-- CHANGE THIS
  annotations:
    # Optional: trigger pod restarts when this secret changes
    # Requires https://github.com/stakater/Reloader deployed in the cluster
    secret.reloader.stakater.com/reload: "app-db-credentials"
spec:
  refreshInterval: 1h               # <-- CHANGE THIS: "5m" for tighter SLA

  secretStoreRef:
    name: aws-secrets-store          # <-- CHANGE THIS: match store above
    kind: SecretStore                # ClusterSecretStore if cross-namespace

  target:
    name: app-db-credentials         # Name of the resulting Kubernetes Secret
    creationPolicy: Owner            # ESO owns this secret; deletes it when ExternalSecret is removed
    template:
      type: Opaque
      engineVersion: v2
      data:
        # Map vault keys → Kubernetes Secret keys
        DB_HOST:     "{{ .host }}"
        DB_NAME:     "{{ .dbname }}"
        DB_USER:     "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"

  data:
    - secretKey: host
      remoteRef:
        key: myapp/prod/db-credentials   # <-- CHANGE THIS: your secret name in the vault
        property: host
    - secretKey: dbname
      remoteRef:
        key: myapp/prod/db-credentials
        property: dbname
    - secretKey: username
      remoteRef:
        key: myapp/prod/db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: myapp/prod/db-credentials
        property: password

---
# ── E. ExternalSecret — sync all keys from a single vault secret ─────────
#
# Use dataFrom instead of data when the vault secret is a JSON object and
# you want ALL keys mapped to the Kubernetes Secret without listing them.
#
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-all-secrets
  namespace: default                 # <-- CHANGE THIS
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore

  target:
    name: app-all-secrets
    creationPolicy: Owner

  dataFrom:
    - extract:
        key: myapp/prod/all-secrets  # <-- CHANGE THIS: vault secret path
