# ============================================================
# TEMPLATE: GitHub Actions — Reusable Docker Build & Push
# WHEN TO USE: Call from any workflow that needs to build and push images
# PREREQUISITES: Container registry accessible from GitHub Actions
# SECRETS NEEDED: registry-token (e.g., GITHUB_TOKEN for GHCR)
# WHAT TO CHANGE: Inputs when calling this workflow
# RELATED FILES: ci/github-actions/dotnet/docker-publish.yml
# MATURITY: Stable
# ============================================================

name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
    secrets:
      registry-token:
        required: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ inputs.image-name }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
