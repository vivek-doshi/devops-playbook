# ============================================================
# TEMPLATE: GitHub Actions — Java Build & Test (Maven + Gradle)
# WHEN TO USE: Java / Spring Boot projects
# PREREQUISITES: pom.xml (Maven) or build.gradle (Gradle)
# SECRETS NEEDED: None
# WHAT TO CHANGE: Lines marked with # <-- CHANGE THIS
# RELATED FILES: docker/java/Dockerfile.springboot, docker/java/Dockerfile.gradle
# MATURITY: Stable
# ============================================================

name: Java Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-test-maven:
    name: Maven Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Run tests
        run: mvn -B test

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/

  build-test-gradle:
    name: Gradle Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test
